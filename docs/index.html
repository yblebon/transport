<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Directions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color:禁止: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #357ae8;
        }
        .zoom-controls {
            margin-bottom: 10px;
        }
        .map-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        #map {
            height: 400px;
            width: 60%;
            border-radius: 4px;
        }
        #directions {
            width: 40%;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow-y: auto;
            max-height: 400px;
        }
        #travel-info {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        #warning-sign {
            margin-top: 10px;
            padding: 10px;
            background-color: #ffeb3b; /* Yellow for warning */
            border: 1px solid #fbc02d;
            border-radius: 4px;
            font-size: 16px;
            color: #b71c1c; /* Red text for emphasis */
            display: none; /* Hidden until national road detected */
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #shop-info {
            margin-top: 10px;
            padding: 10px;
            background-color: #e3f2fd; /* Light blue for info */
            border: 1px solid #bbdefb;
            border-radius: 4px;
            font-size: 16px;
            color: #1ស: 1a237e; /* Dark blue text */
            display: none; /* Hidden until walking/biking with shops */
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #sun-times {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .icon {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Transport Directions</h2>
        <div class="input-group">
            <label for="start">Starting Point:</label>
            <input type="text" id="start" placeholder="Enter starting location (e.g., Eiffel Tower, Paris)">
            <label for="end">Destination:</label>
            <input type="text" id="end" placeholder="Enter destination (e.g., Louvre Museum, Paris)">
            <label for="mode">Travel Mode:</label>
            <select id="mode">
                <option value="DRIVING">Driving</option>
                <option value="WALKING">Walking</option>
                <option value="BICYCLING">Bicycling</option>
                <option value="TRANSIT" selected>Public Transit</option>
            </select>
            <button onclick="calculateRoute()">Get Directions</button>
        </div>
        <div class="zoom-controls">
            <button onclick="zoomIn()">Zoom In</button>
            <button onclick="zoomOut()">Zoom Out</button>
        </div>
        <div class="map-container">
            <div id="map"></div>
            <div id="directions"></div>
        </div>
        <div id="travel-info"></div>
        <div id="warning-sign">
            <svg class="icon" viewBox="0 0 24 24" fill="#b71c1c">
                <path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19H3.5L12 5.5zM12 8v7m0 2h.01"/>
            </svg>
            <span>Caution: National road detected. Watch for hazards!</span>
        </div>
        <div id="shop-info">
            <svg class="icon" viewBox="0 0 24 24" fill="#1a237e">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17h2v-2.26c.79.52 1.71.86 2.74.86s1.95-.34 2.74-.86V17h2v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5z"/>
            </svg>
            <span id="shop-text">Info: Searching for open grocery shops along route...</span>
        </div>
        <div id="sun-times"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDJswns9qd4jh6awTSYDgCcMBKIMkotbEY&callback=initMap" async defer></script>
    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        const API_KEY = 'AIzaSyDJswns9qd4jh6awTSYDgCcMBKIMkotbEY'; // Your API key

        function initMap() {
            // Initialize the map, centered on Paris
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 48.8566, lng: 2.3522 }, // Coordinates for Paris, France
                zoom: 12, // Zoom level suitable for city view
                zoomControl: false // Disable default zoom controls for custom buttons
            });

            // Initialize Directions service and renderer
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            directionsRenderer.setMap(map);
            directionsRenderer.setPanel(document.getElementById('directions'));

            // Fetch sunrise and sunset times for Paris
            fetchSunTimes(48.8566, 2.3522);
        }

        function calculateRoute() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const mode = document.getElementById('mode').value;

            if (!start || !end) {
                alert('Please enter both starting point and destination.');
                return;
            }

            const request = {
                origin: start,
                destination: end,
                travelMode: mode // Uses selected mode: DRIVING, WALKING, BICYCLING, or TRANSIT
            };

            directionsService.route(request, (result, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                    // Display total travel duration
                    const route = result.routes[0].legs[0];
                    const duration = route.duration.text;
                    document.getElementById('travel-info').innerHTML = 
                        `<strong>Total Travel Duration:</strong> ${duration}`;
                    
                    // Check for national roads and show warning
                    checkForNationalRoad(result);
                    // Check for walking/biking and search for open grocery shops
                    checkForShops(mode, result);
                } else {
                    alert('Directions request failed: ' + status);
                    document.getElementById('travel-info').innerHTML = '';
                    document.getElementById('warning-sign').style.display = 'none';
                    document.getElementById('shop-info').style.display = 'none';
                }
            });
        }

        function checkForNationalRoad(result) {
            const warningDiv = document.getElementById('warning-sign');
            const steps = result.routes[0].legs[0].steps;
            let nationalRoadDetected = false;

            // Check each step for national road indicators
            for (let i = 0; i < steps.length; i++) {
                const instructions = steps[i].instructions;
                if (instructions && /US-|N-|A-|Highway/i.test(instructions)) {
                    nationalRoadDetected = true;
                    break;
                }
            }

            warningDiv.style.display = nationalRoadDetected ? 'flex' : 'none';
        }

        function checkForShops(mode, result) {
            const shopDiv = document.getElementById('shop-info');
            const shopText = document.getElementById('shop-text');

            if (mode === 'WALKING' || mode === 'BICYCLING') {
                shopDiv.style.display = 'flex';
                shopText.innerHTML = 'Info: Searching for open grocery shops within 1km of route...';
                searchGroceryShops(result);
            } else {
                shopDiv.style.display = 'none';
            }
        }

        function searchGroceryShops(result) {
            const shopText = document.getElementById('shop-text');
            const route = result.routes[0];
            const polyline = route.overview_polyline; // Encoded polyline from Directions API

            // Places API Search Along Route request
            const request = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': API_KEY,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.openNow'
                },
                body: JSON.stringify({
                    textQuery: 'grocery store',
                    searchAlongRouteParameters: {
                        polyline: {
                            encodedPolyline: polyline
                        }
                    }
                })
            };

            fetch('https://places.googleapis.com/v1/places:searchText', request)
                .then(response => response.json())
                .then(data => {
                    if (data.places && data.places.length > 0) {
                        let shopList = 'Info: Open grocery shops within ~1km of route:<br>';
                        let openShops = 0;
                        data.places.forEach(place => {
                            if (place.openNow) {
                                openShops++;
                                shopList += `- ${place.displayName.text} (${place.formattedAddress})<br>`;
                            }
                        });
                        if (openShops > 0) {
                            shopText.innerHTML = shopList;
                        } else {
                            shopText.innerHTML = 'Info: No open grocery shops found within ~1km of route.';
                        }
                    } else {
                        shopText.innerHTML = 'Info: No grocery shops found within ~1km of route.';
                    }
                })
                .catch(error => {
                    console.error('Error fetching grocery shops:', error);
                    shopText.innerHTML = 'Info: Error searching for open grocery shops.';
                });
        }

        function zoomIn() {
            map.setZoom(map.getZoom() + 1);
        }

        function zoomOut() {
            map.setZoom(map.getZoom() - 1);
        }

        function fetchSunTimes(lat, lng) {
            const url = `https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&date=today&formatted=0`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'OK') {
                        const sunrise = new Date(data.results.sunrise).toLocaleTimeString();
                        const sunset = new Date(data.results.sunset).toLocaleTimeString();
                        document.getElementById('sun-times').innerHTML = 
                            `<strong>Sunrise in Paris:</strong> ${sunrise}<br>` +
                            `<strong>Sunset in Paris:</strong> ${sunset}`;
                    } else {
                        document.getElementById('sun-times').innerHTML = 
                            'Error loading sunrise/sunset times.';
                    }
                })
                .catch(error => {
                    console.error('Error fetching sunrise/sunset:', error);
                    document.getElementById('sun-times').innerHTML = 
                        'Error loading sunrise/sunset times.';
                });
        }
    </script>
</body>
</html>
