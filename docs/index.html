<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayfind — Transport Directions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --surface2: #1f2435;
            --border: rgba(255,255,255,0.07);
            --accent: #4f8eff;
            --accent-glow: rgba(79,142,255,0.18);
            --accent-dim: rgba(79,142,255,0.12);
            --text: #f0f2f7;
            --text-muted: #7a84a0;
            --text-subtle: #4a5168;
            --warn-bg: rgba(255,186,0,0.1);
            --warn-border: rgba(255,186,0,0.3);
            --warn-text: #ffba00;
            --info-bg: rgba(79,142,255,0.08);
            --info-border: rgba(79,142,255,0.2);
            --success: #34d399;
            --error-bg: rgba(239,68,68,0.1);
            --error-border: rgba(239,68,68,0.3);
            --error-text: #f87171;
            --radius: 14px;
            --radius-sm: 9px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        .app { display: grid; grid-template-columns: 380px 1fr; grid-template-rows: 60px 1fr; height: 100vh; overflow: hidden; }
        header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; }
        .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
        .logo span { color: var(--accent); }
        .header-pill { margin-left: auto; font-size: 12px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .sidebar-inner { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
        .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 10px; }
        .route-inputs { position: relative; display: flex; flex-direction: column; gap: 0; }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 14px; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; z-index: 1; }
        .input-icon.origin { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .input-icon.dest { background: var(--success); box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }
        .route-input { width: 100%; padding: 13px 14px 13px 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .route-input::placeholder { color: var(--text-subtle); }
        .route-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .route-input-origin { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-bottom: none; }
        .route-input-dest { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
        .connector { position: absolute; left: 17px; top: 44px; width: 2px; height: 24px; background: linear-gradient(to bottom, var(--accent), var(--success)); opacity: 0.4; z-index: 1; pointer-events: none; }
        .mode-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .mode-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; transition: all 0.15s; outline: none; }
        .mode-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
        .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .mode-btn svg { width: 20px; height: 20px; }
        .go-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s; }
        .go-btn:hover { opacity: 0.92; box-shadow: 0 4px 20px rgba(79,142,255,0.4); }
        .go-btn:active { transform: scale(0.98); }
        .go-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .go-btn .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .go-btn.loading .btn-label { display: none; }
        .go-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .divider { height: 1px; background: var(--border); }
        .info-card { border-radius: var(--radius-sm); padding: 14px; font-size: 13.5px; display: none; animation: fadeSlide 0.25s ease; }
        .info-card.visible { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .travel-card { background: var(--info-bg); border: 1px solid var(--info-border); }
        .stat-row { display: flex; gap: 20px; }
        .stat { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-value { font-size: 18px; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text); }
        .warn-card { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); display: flex !important; align-items: flex-start; gap: 10px; }
        .warn-card:not(.visible) { display: none !important; }
        .warn-card svg { flex-shrink: 0; margin-top: 1px; }
        .shop-card { background: var(--info-bg); border: 1px solid var(--info-border); color: var(--text-muted); }
        .shop-card .shop-title { font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .shop-list { display: flex; flex-direction: column; gap: 6px; }
        .shop-item { display: flex; flex-direction: column; gap: 1px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 7px; border: 1px solid var(--border); }
        .shop-name { font-size: 13px; color: var(--text); font-weight: 500; }
        .shop-addr { font-size: 11px; color: var(--text-muted); }
        .error-card { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); display: flex !important; align-items: flex-start; gap: 10px; }
        .error-card:not(.visible) { display: none !important; }
        .error-card svg { flex-shrink: 0; margin-top: 2px; }
        .sun-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; }
        .sun-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .sun-row + .sun-row { margin-top: 8px; }
        .sun-label { display: flex; align-items: center; gap: 7px; color: var(--text-muted); font-size: 12.5px; }
        .sun-time { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
        .sun-location { font-size: 11px; color: var(--text-subtle); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #map { width: 100%; height: 100%; }
        .map-wrap { position: relative; }
        .zoom-overlay { position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 4px; z-index: 5; }
        .zoom-btn { width: 38px; height: 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 20px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); transition: background 0.15s; line-height: 1; }
        .zoom-btn:hover { background: var(--surface2); }
        #directions table { width: 100%; border-collapse: collapse; }
        #directions td { padding: 6px 2px; vertical-align: top; font-size: 12.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        #directions img { display: none; }
        #directions .adp-legal { display: none; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <span class="logo">Way<span>find</span></span>
        <span class="header-pill">Transport Directions</span>
    </header>

    <aside class="sidebar" role="complementary" aria-label="Route controls and info">
        <div class="sidebar-inner">
            <div>
                <div class="section-label">Route</div>
                <div class="route-inputs">
                    <div class="input-wrap">
                        <span class="input-icon origin" aria-hidden="true"></span>
                        <input class="route-input route-input-origin" id="start" type="text" placeholder="Starting point" aria-label="Starting point" autocomplete="off">
                    </div>
                    <div class="connector" aria-hidden="true"></div>
                    <div class="input-wrap">
                        <span class="input-icon dest" aria-hidden="true"></span>
                        <input class="route-input route-input-dest" id="end" type="text" placeholder="Destination" aria-label="Destination" autocomplete="off">
                    </div>
                </div>
            </div>

            <div>
                <div class="section-label">Travel mode</div>
                <div class="mode-grid" role="group" aria-label="Select travel mode">
                    <button class="mode-btn" data-mode="DRIVING" aria-pressed="false" aria-label="Driving">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="8" width="20" height="10" rx="2"/>
                            <path d="M6 8V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/>
                            <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
                        </svg>
                        Drive
                    </button>
                    <button class="mode-btn" data-mode="WALKING" aria-pressed="false" aria-label="Walking">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="4" r="1.5"/>
                            <path d="M8 20l2-6 2 3 2-5 2 8M9 10l1-3h4l1 3"/>
                        </svg>
                        Walk
                    </button>
                    <button class="mode-btn" data-mode="BICYCLING" aria-pressed="false" aria-label="Bicycling">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/>
                            <path d="M6 15l4-8h4l2 4M10 7l2 8"/>
                        </svg>
                        Bike
                    </button>
                    <button class="mode-btn active" data-mode="TRANSIT" aria-pressed="true" aria-label="Public transit">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="3" width="16" height="14" rx="2"/>
                            <path d="M8 17v2M16 17v2M4 11h16"/>
                            <circle cx="8" cy="14" r="1"/><circle cx="16" cy="14" r="1"/>
                        </svg>
                        Transit
                    </button>
                </div>
            </div>

            <button class="go-btn" id="go-btn" onclick="calculateRoute()" aria-label="Get directions">
                <span class="btn-label">Get Directions</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>

            <div class="info-card error-card" id="error-card" role="alert" aria-live="assertive">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="error-text"></span>
            </div>

            <div class="info-card travel-card" id="travel-card" aria-live="polite">
                <div class="stat-row">
                    <div class="stat">
                        <span class="stat-label">Duration</span>
                        <span class="stat-value" id="stat-duration">—</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Distance</span>
                        <span class="stat-value" id="stat-distance">—</span>
                    </div>
                </div>
            </div>

            <div class="info-card warn-card" id="warn-card" role="alert" aria-live="polite">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 2L1 21h22L12 2z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                <span>Caution: National road detected. Watch for hazards!</span>
            </div>

            <div id="directions-wrap" style="display:none">
                <div class="section-label">Step by step</div>
                <div id="directions" role="region" aria-label="Step-by-step directions"></div>
            </div>

            <div class="info-card shop-card" id="shop-card" aria-live="polite">
                <div class="shop-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                    Grocery shops near route
                </div>
                <div class="shop-list" id="shop-list"></div>
            </div>

            <div class="divider"></div>

            <div>
                <div class="section-label">Sun times</div>
                <div class="sun-card" id="sun-card" aria-live="polite">
                    <div class="sun-location" id="sun-location">Paris, France</div>
                    <div class="sun-row">
                        <span class="sun-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffba00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                                <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                                <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                            </svg>
                            Sunrise
                        </span>
                        <span class="sun-time" id="sun-rise">—</span>
                    </div>
                    <div class="sun-row">
                        <span class="sun-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/>
                                <line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/>
                                <line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/>
                            </svg>
                            Sunset
                        </span>
                        <span class="sun-time" id="sun-set">—</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <div class="map-wrap" role="main">
        <div id="map" aria-label="Interactive route map"></div>
        <div class="zoom-overlay">
            <button class="zoom-btn" onclick="zoomIn()" aria-label="Zoom in">+</button>
            <button class="zoom-btn" onclick="zoomOut()" aria-label="Zoom out">−</button>
        </div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDJswns9qd4jh6awTSYDgCcMBKIMkotbEY&callback=initMap" async defer></script>
<script>
    const API_KEY = 'AIzaSyDJswns9qd4jh6awTSYDgCcMBKIMkotbEY';
    let map, directionsService, directionsRenderer;
    let selectedMode = 'TRANSIT';

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
            btn.classList.add('active');
            btn.setAttribute('aria-pressed', 'true');
            selectedMode = btn.dataset.mode;
        });
    });

    ['start', 'end'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') calculateRoute(); });
    });

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 48.8566, lng: 2.3522 },
            zoom: 12,
            zoomControl: false,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
            styles: [
                { elementType: 'geometry', stylers: [{ color: '#1a1f2e' }] },
                { elementType: 'labels.text.fill', stylers: [{ color: '#7a84a0' }] },
                { elementType: 'labels.text.stroke', stylers: [{ color: '#0f1117' }] },
                { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#2a3044' }] },
                { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2a3044' }] },
                { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#343d58' }] },
                { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#4f5b7c' }] },
                { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1220' }] },
                { featureType: 'poi', elementType: 'geometry', stylers: [{ color: '#1f2435' }] },
                { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
                { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#2a3044' }] },
                { featureType: 'transit.station', elementType: 'labels.text.fill', stylers: [{ color: '#5a6480' }] },
            ]
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            polylineOptions: { strokeColor: '#4f8eff', strokeWeight: 4, strokeOpacity: 0.85 }
        });
        directionsRenderer.setMap(map);
        directionsRenderer.setPanel(document.getElementById('directions'));
        fetchSunTimes(48.8566, 2.3522, 'Paris');
    }

    function setLoading(on) {
        const btn = document.getElementById('go-btn');
        btn.classList.toggle('loading', on);
        btn.disabled = on;
    }

    function showError(msg) {
        document.getElementById('error-text').textContent = msg;
        document.getElementById('error-card').classList.add('visible');
    }

    function clearError() {
        document.getElementById('error-card').classList.remove('visible');
    }

    function calculateRoute() {
        const start = document.getElementById('start').value.trim();
        const end = document.getElementById('end').value.trim();
        clearError();

        if (!start || !end) { showError('Please enter both a starting point and a destination.'); return; }

        setLoading(true);
        document.getElementById('travel-card').classList.remove('visible');
        document.getElementById('warn-card').classList.remove('visible');
        document.getElementById('shop-card').classList.remove('visible');
        document.getElementById('directions-wrap').style.display = 'none';

        directionsService.route(
            { origin: start, destination: end, travelMode: google.maps.TravelMode[selectedMode] },
            (result, status) => {
                setLoading(false);
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                    const leg = result.routes[0].legs[0];
                    document.getElementById('stat-duration').textContent = leg.duration.text;
                    document.getElementById('stat-distance').textContent = leg.distance.text;
                    document.getElementById('travel-card').classList.add('visible');
                    document.getElementById('directions-wrap').style.display = 'block';
                    fetchSunTimes(leg.end_location.lat(), leg.end_location.lng(), leg.end_address);
                    checkForNationalRoad(result);
                    checkForShops(result);
                } else {
                    const messages = { NOT_FOUND: 'One or both locations could not be found.', ZERO_RESULTS: 'No route found for the selected travel mode.', INVALID_REQUEST: 'Invalid request. Please check your inputs.', REQUEST_DENIED: 'Request denied. The API key may be invalid.', OVER_DAILY_LIMIT: 'API daily limit reached.', UNKNOWN_ERROR: 'An unknown error occurred. Please try again.' };
                    showError(messages[status] || `Error: ${status}`);
                }
            }
        );
    }

    function checkForNationalRoad(result) {
        const steps = result.routes[0].legs[0].steps;
        const rx = /\b(US|N|A|D|Highway)\s*[-\u2013]?\s*\d+\b/i;
        const detected = steps.some(s => rx.test(s.instructions || ''));
        document.getElementById('warn-card').classList.toggle('visible', detected);
    }

    function checkForShops(result) {
        if (selectedMode === 'DRIVING') return;
        const shopCard = document.getElementById('shop-card');
        const shopList = document.getElementById('shop-list');
        shopCard.classList.add('visible');
        shopList.innerHTML = '<div style="color:var(--text-subtle);font-size:12px">Searching nearby\u2026</div>';

        fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': API_KEY, 'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.currentOpeningHours' },
            body: JSON.stringify({ textQuery: 'grocery store', searchAlongRouteParameters: { polyline: { encodedPolyline: result.routes[0].overview_polyline } } })
        })
        .then(r => r.json())
        .then(data => {
            const open = (data.places || []).filter(p => p.currentOpeningHours?.openNow);
            if (!open.length) { shopList.innerHTML = '<div style="color:var(--text-subtle);font-size:12px">No open grocery shops found near route.</div>'; return; }
            shopList.innerHTML = open.slice(0, 5).map(p => `<div class="shop-item"><span class="shop-name">${p.displayName.text}</span><span class="shop-addr">${p.formattedAddress}</span></div>`).join('');
        })
        .catch(() => { shopList.innerHTML = '<div style="color:var(--error-text);font-size:12px">Error fetching shops.</div>'; });
    }

    function zoomIn()  { map.setZoom(map.getZoom() + 1); }
    function zoomOut() { map.setZoom(map.getZoom() - 1); }

    function fetchSunTimes(lat, lng, locationLabel) {
        document.getElementById('sun-location').textContent = locationLabel || `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        document.getElementById('sun-rise').textContent = '\u2026';
        document.getElementById('sun-set').textContent = '\u2026';
        fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&date=today&formatted=0`)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'OK') {
                    document.getElementById('sun-rise').textContent = new Date(data.results.sunrise).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    document.getElementById('sun-set').textContent  = new Date(data.results.sunset).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else { document.getElementById('sun-rise').textContent = document.getElementById('sun-set').textContent = 'N/A'; }
            })
            .catch(() => { document.getElementById('sun-rise').textContent = document.getElementById('sun-set').textContent = 'Error'; });
    }
</script>
</body>
</html>
